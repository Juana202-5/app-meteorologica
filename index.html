<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Localizador Geográfico Global</title>
    <!-- Esto vincula tus estilos (Asegúrate de que style.css esté en la misma carpeta) -->
    <link rel="stylesheet" href="style.css">
    <!-- Estos enlaces cargan el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <h1>Localizador Geográfico Global</h1>
    <p>Consumo de API OpenStreetMap - Juana De La Luz Calva</p>
    
    <input type="text" id="ubicacion" placeholder="M">
    <button>Consultar API</button>
    
    <div id="map" style="height: 500px; width: 100%;"></div>

    <script>
        // Inicializar el mapa
        var map = L.map('map').setView([19.4326, -99.1332], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
