<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Localizador Geográfico Global</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librería de Leaflet para que el mapa funcione -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <h1>Localizador Geográfico Global</h1>
    <p>Consumo de API OpenStreetMap - Juana De La Luz Calva</p>
    
    <input type="text" id="ubicacion" placeholder="Escribe aquí...">
    <button onclick="alert('Funcionalidad en desarrollo')">Consultar API</button>
    
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([19.4326, -99.1332], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
